<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/" class="brand-link">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
          </svg>
        </div>
        <span class="brand-text">JobTracker</span>
      </a>
    </div>

    <button class="mobile-menu-button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
      <span class="sr-only">Menu</span>
      <svg *ngIf="!isMenuOpen()" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
      <svg *ngIf="isMenuOpen()" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="navbar-menu" [class.is-open]="isMenuOpen()">
      <!-- ENTERPRISE links -->
      <a *ngIf="isEnterprise()" routerLink="/dashboard" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Dashboard</span>
      </a>
      
      <a *ngIf="isEnterprise()" routerLink="/add-job" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>Nouvelle Offre</span>
      </a>

      <!-- CANDIDATE links -->
      <a *ngIf="isCandidate()" routerLink="/job-search" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Offres d'emploi</span>
      </a>
      
      <a *ngIf="isCandidate()" routerLink="/jobs" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
        </svg>
        <span>Mes Candidatures</span>
      </a>

      <a *ngIf="isCandidate()" routerLink="/ai-suggestions" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5"></path>
          <path d="M2 12l10 5 10-5"></path>
        </svg>
        <span>Suggestions IA</span>
      </a>

      <!-- Common links -->
      <a *ngIf="isEnterprise()" routerLink="/statistics" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="20" x2="12" y2="10"></line>
          <line x1="18" y1="20" x2="18" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="16"></line>
        </svg>
        <span>Statistiques</span>
      </a>
    </div>

    <div class="navbar-actions">
      <!-- Notification Bell for Candidates -->
      <div *ngIf="isCandidate()" class="notification-wrapper">
        <button class="notification-bell" (click)="toggleNotifications()" title="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span *ngIf="notificationService.unreadCount() > 0" class="notification-badge">
            {{ notificationService.unreadCount() > 9 ? '9+' : notificationService.unreadCount() }}
          </span>
        </button>

        <div *ngIf="showNotifications()" class="notification-dropdown">
          <div class="notification-header">
            <h4>Notifications</h4>
            <button *ngIf="notificationService.unreadCount() > 0" class="mark-all-read" (click)="markAllAsRead()">
              Tout marquer comme lu
            </button>
          </div>
          <div class="notification-list">
            <div *ngIf="notificationService.notifications().length === 0" class="notification-empty">
              Aucune notification
            </div>
            <div *ngFor="let notif of notificationService.notifications()"
                 class="notification-item"
                 [class.unread]="!notif.read"
                 (click)="markAsRead(notif)">
              <div class="notification-title">{{ notif.title }}</div>
              <div class="notification-message">{{ notif.message }}</div>
              <div class="notification-time">{{ notif.createdAt | date:'dd/MM/yyyy HH:mm' }}</div>
            </div>
          </div>
        </div>
      </div>

      <a routerLink="/profile" routerLinkActive="active" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Profil</span>
      </a>
    </div>
  </div>
</nav>
