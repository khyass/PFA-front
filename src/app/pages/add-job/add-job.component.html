<div class="add-job-container">
  <div class="form-header">
    <a routerLink="/dashboard" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Retour
    </a>
    <h1 class="form-title">Nouvelle Offre d'Emploi</h1>
    <p class="form-subtitle">Publiez une nouvelle offre d'emploi</p>
  </div>

  <form (ngSubmit)="onSubmit()" class="job-form">
    <!-- Error Message -->
    <div class="error-alert" *ngIf="errorMessage()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <div class="form-card">
      <h2 class="card-section-title">Informations de l'Offre</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label for="company" class="form-label">
            Entreprise *
          </label>
          <input
            type="text"
            id="company"
            class="form-control"
            placeholder="Ex: Google, Microsoft..."
            [value]="formData().companyName"
            (input)="updateField('companyName', $any($event.target).value)"
            [readonly]="!!formData().companyName"
            required
          />
        </div>

        <div class="form-group">
          <label for="position" class="form-label">
            Titre du poste *
          </label>
          <input
            type="text"
            id="position"
            class="form-control"
            placeholder="Ex: Software Engineer..."
            [value]="formData().title"
            (input)="updateField('title', $any($event.target).value)"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="status" class="form-label">
            Statut *
          </label>
          <select
            id="status"
            class="form-select"
            [value]="formData().status"
            (change)="updateField('status', $any($event.target).value)"
            required
          >
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2 class="card-section-title">Détails Supplémentaires</h2>
      
      <div class="form-group">
        <label for="notes" class="form-label">
          Notes
        </label>
        <textarea
          id="notes"
          class="form-textarea"
          placeholder="Ajoutez des notes ou une description..."
          rows="4"
          [value]="formData().notes"
          (input)="updateField('notes', $any($event.target).value)"
        ></textarea>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/dashboard" class="btn btn-outline btn-lg">
        Annuler
      </a>
      <button type="submit" class="btn btn-primary btn-lg" [disabled]="isSubmitting()">
        <svg *ngIf="!isSubmitting()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span class="spinner" *ngIf="isSubmitting()"></span>
        <span>{{ isSubmitting() ? 'Enregistrement...' : 'Publier l\'offre' }}</span>
      </button>
    </div>
  </form>
</div>
